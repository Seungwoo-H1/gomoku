name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gomoku
          POSTGRES_PASSWORD: gomoku_dev
          POSTGRES_DB: gomoku_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://gomoku:gomoku_dev@localhost:5432/gomoku_test"

      - name: Run migrations
        run: npx prisma migrate dev --name init --skip-seed
        env:
          DATABASE_URL: "postgresql://gomoku:gomoku_dev@localhost:5432/gomoku_test"

      - name: Lint
        run: npx eslint src/

      - name: Test
        run: npx vitest run
        env:
          DATABASE_URL: "postgresql://gomoku:gomoku_dev@localhost:5432/gomoku_test"
          JWT_SECRET: "test-secret-for-ci-at-least-32"

      - name: Build
        run: npm run build

  frontend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - run: npm ci

      - name: Lint
        run: npx eslint src/

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose build --no-cache

      - name: Run docker compose
        run: |
          docker compose up -d
          sleep 10
          curl -f http://localhost:4000/api/health || exit 1
          docker compose down
