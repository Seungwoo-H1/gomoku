services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gomoku
      POSTGRES_PASSWORD: gomoku_dev
      POSTGRES_DB: gomoku
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gomoku"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    environment:
      DATABASE_URL: "postgresql://gomoku:gomoku_dev@postgres:5432/gomoku?schema=public"
      JWT_SECRET: "dev-secret-change-in-production-at-least-32-chars!"
      PORT: "4000"
      CORS_ORIGIN: "http://localhost:5173"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate dev --name init && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
